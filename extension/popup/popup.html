<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #1f2937;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid #e5e7eb;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
    }
    .header p {
      font-size: 11px;
      color: #6b7280;
      margin-top: 2px;
    }
    .content {
      padding: 16px;
    }
    .score-card {
      text-align: center;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .score-number {
      font-size: 36px;
      font-weight: 800;
    }
    .score-label {
      font-size: 13px;
      font-weight: 500;
      margin-top: 4px;
    }
    .score-confidence {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 2px;
    }
    .high { background: #dcfce7; color: #166534; }
    .moderate { background: #fef9c3; color: #854d0e; }
    .low { background: #fee2e2; color: #991b1b; }
    .no-score { background: #f3f4f6; color: #6b7280; }
    .feedback-section {
      margin-top: 12px;
    }
    .feedback-section h3 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .feedback-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .feedback-btn {
      padding: 8px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .feedback-btn:hover {
      background: #f3f4f6;
    }
    .feedback-btn.selected {
      border-color: #3b82f6;
      background: #eff6ff;
      color: #1d4ed8;
    }
    .submit-btn {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .submit-btn:hover { background: #1d4ed8; }
    .submit-btn:disabled { opacity: 0.5; cursor: default; }
    .status-msg {
      text-align: center;
      font-size: 12px;
      padding: 8px;
      border-radius: 8px;
      margin-top: 8px;
    }
    .status-success { background: #dcfce7; color: #166534; }
    .status-error { background: #fee2e2; color: #991b1b; }
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
      text-align: center;
    }
    .footer a {
      font-size: 12px;
      color: #2563eb;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
    .no-job {
      padding: 24px 16px;
      text-align: center;
      color: #6b7280;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>JobScout AI</h1>
    <p>AI-powered job trust scores</p>
  </div>
  <div id="main-content" class="content">
    <div class="no-job">Checking current page...</div>
  </div>
  <div class="footer">
    <a href="#" id="dashboard-link">Open Dashboard</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
